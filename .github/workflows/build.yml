name: Build Roblox Optimize Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ldid xz make

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          cd $THEOS
          git submodule update --init --recursive
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Install iOS SDK
        run: |
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -r /tmp/theos-sdks/iPhoneOS16.5.sdk $THEOS/sdks/
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Clean
        run: |
          rm -rf .theos packages

      - name: Build Dylib
        run: |
          export THEOS=${{ github.workspace }}/theos
          export ARCHS="arm64 arm64e"
          export TARGET="iphone:clang:16.5:16.0"
          export SDKVERSION=16.5
          gmake package FINALPACKAGE=1 2>&1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Find output files
        run: |
          echo "=== packages/ ==="
          ls -la packages/ || echo "No packages dir"
          echo "=== .theos dylib ==="
          find .theos -name "*.dylib" 2>/dev/null || echo "No dylib found"

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: RobloxOptimize-dylib
          path: |
            .theos/obj/**/*.dylib
          retention-days: 7
          if-no-files-found: warn
