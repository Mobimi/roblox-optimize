# .github/workflows/build.yml
name: Build GameOptimizer Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          brew install ldid xz
          git clone --recursive https://github.com/theos/theos.git $THEOS
          cd $THEOS
          git submodule update --init --recursive
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Install iOS SDK
        run: |
          curl -LO https://github.com/theos/sdks/releases/download/master/iPhoneOS16.5.sdk.tar.xz
          tar -xf iPhoneOS16.5.sdk.tar.xz -C $THEOS/sdks/
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build Dylib
        run: |
          export THEOS=${{ github.workspace }}/theos
          export ARCHS="arm64 arm64e"
          export TARGET="iphone:clang:16.5:16.0"
          make -C ${{ github.workspace }} package 2>&1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameOptimizer-dylib
          path: |
            packages/*.deb
            .theos/obj/debug/*.dylib
          retention-days: 7
